name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            artifact: aoe4-replay-launcher-linux-x86_64
            executable: target/release/aoe4_replay_launcher
          - name: Windows x86_64
            os: windows-latest
            artifact: aoe4-replay-launcher-windows-x86_64
            executable: target/release/aoe4_replay_launcher.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release executable
        run: cargo build --release --locked

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.executable }}
          if-no-files-found: error
